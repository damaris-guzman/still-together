<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Kaleidoscope</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    /* ── Decoding Language Overlay ── */
    #word-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      cursor: default;
    }

    .word-frag {
      position: absolute;
      pointer-events: auto;
      cursor: grab;
      font-family: 'Courier New', monospace;
      color: rgba(255, 218, 255, 0.84);
      text-shadow:
        0 0 10px rgba(220, 80, 255, 0.60),
        0 0 28px rgba(180, 50, 255, 0.32);
      letter-spacing: 0.12em;
      user-select: none;
      white-space: nowrap;
      transition:
        left  1.2s cubic-bezier(0.22, 0.61, 0.36, 1),
        top   1.2s cubic-bezier(0.22, 0.61, 0.36, 1),
        opacity 0.6s;
    }

    .word-frag.dragging {
      cursor: grabbing;
      z-index: 100;
      text-shadow:
        0 0 16px rgba(255, 190, 255, 1.0),
        0 0 40px rgba(210, 90, 255, 0.90);
      transition: none !important;
    }

    .word-frag.melted {
      text-shadow:
        0 0 14px rgba(255, 100, 200, 0.90),
        0 0 36px rgba(255, 60, 180, 0.55);
    }

    #pattern-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Courier New', monospace;
      font-size: clamp(11px, 1.6vw, 18px);
      color: rgba(255, 180, 255, 0.92);
      letter-spacing: 0.32em;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.35s;
      text-shadow: 0 0 20px rgba(220, 60, 255, 0.80);
    }

    #status-line {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 1.1vw, 13px);
      color: rgba(190, 80, 230, 0.45);
      letter-spacing: 0.22em;
      pointer-events: none;
      z-index: 20;
    }

    #portal-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #portal-ring {
      width: 0;
      height: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 70, 220, 0.70);
      box-shadow:
        0 0 60px rgba(200, 55, 255, 0.50),
        inset 0 0 60px rgba(170, 45, 255, 0.22);
      transition:
        width  1.1s cubic-bezier(0.16, 1, 0.3, 1),
        height 1.1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #portal-text {
      font-family: 'Courier New', monospace;
      font-size: clamp(10px, 1.5vw, 18px);
      color: rgba(255, 200, 255, 0);
      letter-spacing: 0.30em;
      margin-top: 2.4em;
      text-align: center;
      pointer-events: none;
      transition: color 1.4s ease;
      text-shadow: 0 0 24px rgba(255, 70, 255, 0.80);
    }

    #nav-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      z-index: 300;
      pointer-events: none;
      transition: opacity 1.8s ease;
    }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

/* ─── vertex shader ─────────────────────────────────────── */
const vert = `
  varying vec2 vUv;
  void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }
`;

/* ─── fragment shader ───────────────────────────────────── */
const frag = `
  precision highp float;
  uniform float uTime;
  uniform vec2  uResolution;
  uniform float uProgress;
  varying vec2  vUv;

  #define PI 3.14159265359

  /* ── Utility ──────────────────────────────────────────── */
  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

  /* 4-fold mirror: fold into first quadrant */
  vec2 fold4(vec2 p){ return abs(p); }

  /* ── Circuit symbols: 14 types, Matrix-style animation ─── */
  float loopCell(vec2 f, vec2 id, float t) {
    f -= 0.5;
    float r = length(f);
    float a = atan(f.y, f.x);

    /* Fast per-cell random cycling ~11 fps */
    float fp  = hash(id) * 97.13;
    float fr  = floor(t * 11.0 + fp);
    float fh  = hash(id + vec2(fr * 0.3137, fr * 0.2179));
    float sym = floor(fh * 14.0);

    /* 22% of cells lock into esoteric type (4-13) for a beat */
    float sp = hash(id * 3.71) * 43.7;
    float sr = floor(t * 2.5 + sp);
    float sh = hash(id * 0.91 + vec2(sr * 0.617, sr * 0.413));
    sym = mix(sym, 4.0 + floor(hash(id * 1.3 + vec2(sr)) * 10.0), step(0.78, sh));

    if (sym < 1.0) {
      /* ○ Full ring */
      return abs(r - 0.24);
    }
    if (sym < 2.0) {
      /* ◑ C-arc / open ring */
      float g   = hash(id * 2.3) * 6.28318;
      float ang = mod(a - g + 3.14159, 6.28318) - 3.14159;
      return abs(r - 0.24) + smoothstep(0.5, 0.0, abs(ang)) * 0.30;
    }
    if (sym < 3.0) {
      /* 8 Figure-8 vertical */
      return min(abs(length(f - vec2(0.0,  0.12)) - 0.12),
                 abs(length(f + vec2(0.0,  0.12)) - 0.12));
    }
    if (sym < 4.0) {
      /* ◎ Concentric rings */
      return min(abs(r - 0.23), abs(r - 0.12));
    }
    if (sym < 5.0) {
      /* ✦ 4-point star */
      return abs(r - (0.12 + 0.14 * cos(a * 4.0)));
    }
    if (sym < 6.0) {
      /* ✡ 6-point star */
      return abs(r - (0.09 + 0.17 * abs(cos(a * 3.0))));
    }
    if (sym < 7.0) {
      /* @ Spiral (Archimedean) */
      float normA = a / 6.28318 + 0.5;
      float rSp   = fract(r / 0.26 - normA + 0.5);
      return min(rSp, 1.0 - rSp) * 0.26;
    }
    if (sym < 8.0) {
      /* Eye / almond – two-circle intersection outline */
      float d1 = length(f - vec2(0.0, -0.15)) - 0.30;
      float d2 = length(f - vec2(0.0,  0.15)) - 0.30;
      return abs(max(-d1, -d2)) * 0.55;
    }
    if (sym < 9.0) {
      /* + Cross */
      float b1 = max(abs(f.x) - 0.04, abs(f.y) - 0.25);
      float b2 = max(abs(f.y) - 0.04, abs(f.x) - 0.25);
      return abs(min(b1, b2));
    }
    if (sym < 10.0) {
      /* ∞ Infinity – horizontal figure-8 */
      return min(abs(length(f - vec2( 0.14, 0.0)) - 0.12),
                 abs(length(f + vec2( 0.14, 0.0)) - 0.12));
    }
    if (sym < 11.0) {
      /* ☽ Crescent moon */
      float outer = length(f) - 0.24;
      float inner = length(f - vec2(0.10, 0.0)) - 0.17;
      return abs(max(-outer, inner)) * 0.55;
    }
    if (sym < 12.0) {
      /* △ Triangle outline (equilateral) */
      float k2 = 1.73205;
      vec2 tp  = f;
      tp.x = abs(tp.x) - 0.22;
      tp.y = tp.y + 0.22 / k2;
      if (tp.x + k2 * tp.y > 0.0) tp = vec2(tp.x - k2*tp.y, -k2*tp.x - tp.y) * 0.5;
      tp.x -= clamp(tp.x, -0.44, 0.0);
      return abs(-length(tp) * sign(tp.y + 0.0001)) * 0.75;
    }
    if (sym < 13.0) {
      /* ☯ Triskelion – 3 arcs at 120° */
      float best = 1.0;
      for (int k = 0; k < 3; k++) {
        float ka = float(k) * 2.09440;
        float ca = cos(ka), sa = sin(ka);
        vec2  rf = vec2(ca*f.x - sa*f.y, sa*f.x + ca*f.y);
        vec2  c  = vec2(0.11, 0.0);
        float ar = abs(length(rf - c) - 0.13);
        float aa = atan(rf.y - c.y, rf.x - c.x);
        ar += smoothstep(1.5, 2.8, abs(aa)) * 0.35;
        best = min(best, ar);
      }
      return best;
    }
    /* Ω Horseshoe / U-shape */
    float arcPt = abs(r - 0.21) + step(0.0, f.y) * 0.28;
    float legL  = abs(max(abs(f.x + 0.21) - 0.026, abs(f.y - 0.05) - 0.17));
    float legR  = abs(max(abs(f.x - 0.21) - 0.026, abs(f.y - 0.05) - 0.17));
    return min(arcPt, min(legL, legR));
  }

  /* Tiling circuit-loop pattern */
  float circuitLoops(vec2 p, float scale, float t) {
    p *= scale;
    vec2  id  = floor(p);
    vec2  f   = fract(p);
    /* Flash: brief brightness spike at the start of each symbol frame */
    float fp  = hash(id) * 97.13;
    float fl  = exp(-fract(t * 11.0 + fp) * 9.0) * 0.22;
    float d   = loopCell(f, id, t);
    return smoothstep(0.068, 0.003, d) + fl * smoothstep(0.18, 0.0, d);
  }

  /* ── Signal-dot particles ─────────────────────────────── */
  /* Flows in 4-fold-folded space so dots are symmetric      */
  float signalDots(vec2 p4, float t) {
    float result = 0.0;

    /* 14 horizontal trace rows */
    for (int i = 0; i < 14; i++) {
      float fi    = float(i);
      float rowY  = fi * 0.092;               /* 0 → 1.19 in p4.y  */
      float dy    = abs(p4.y - rowY);

      float spd   = (0.10 + hash(vec2(fi, 0.31)) * 0.22) * (1.0 + uProgress * 6.0);
      float phase = hash(vec2(fi, 1.73));
      float gap   = 0.19 + hash(vec2(fi, 2.17)) * 0.14; /* dot spacing    */

      float xr    = fract(p4.x / gap - t * spd + phase);
      float xd    = (xr - 0.5) * gap;         /* signed dist to nearest dot */

      /* Elliptical glow: sharp in x, narrower in y */
      float dist2 = xd*xd * 1800.0 + dy*dy * 6000.0;
      result += exp(-dist2);
    }

    /* 6 vertical trace columns for the corner areas */
    for (int j = 0; j < 6; j++) {
      float fj    = float(j);
      float colX  = 0.28 + fj * 0.18;         /* 0.28 → 1.18 in p4.x */
      float dx    = abs(p4.x - colX);

      float spd   = (0.08 + hash(vec2(fj, 5.0)) * 0.14) * (1.0 + uProgress * 6.0);
      float phase = hash(vec2(fj, 6.4));
      float gap   = 0.22 + hash(vec2(fj, 7.2)) * 0.12;

      float yr    = fract(p4.y / gap - t * spd + phase);
      float yd    = (yr - 0.5) * gap;

      float dist2 = yd*yd * 1800.0 + dx*dx * 6000.0;
      result += exp(-dist2) * 0.55;
    }

    return min(result, 2.5);
  }

  /* ── Concentric oval rings ────────────────────────────── */
  float ovalRings(vec2 p, float xsc, float ysc, float freq, float spd, float t) {
    float r = length(p * vec2(xsc, ysc));
    return sin(r * freq - t * spd) * 0.5 + 0.5;
  }

  /* ── Main ─────────────────────────────────────────────── */
  void main() {
    vec2 uv = (vUv - 0.5) * 2.0;
    uv.x   *= uResolution.x / uResolution.y;
    float t  = uTime;

    vec2  p4 = fold4(uv);
    float rE = length(uv);
    /* Diamond / L1 metric for the central shape */
    float rD = abs(uv.x) + abs(uv.y * 0.58);

    /* ── Palette ── */
    vec3 cVoid   = vec3(0.05, 0.015, 0.07);   /* near-black purple   */
    vec3 cPurp   = vec3(0.17, 0.06,  0.20);   /* dark purple         */
    vec3 cMauve  = vec3(0.50, 0.22,  0.40);   /* mid mauve           */
    vec3 cPink   = vec3(0.88, 0.54,  0.68);   /* bright pink         */
    vec3 cBrown  = vec3(0.20, 0.07,  0.11);   /* band background     */
    vec3 cCopper = vec3(0.80, 0.36,  0.08);   /* circuit trace       */
    vec3 cOrange = vec3(0.96, 0.40,  0.06);   /* center orange       */
    vec3 cAmber  = vec3(1.00, 0.72,  0.20);   /* amber               */
    vec3 cGlow   = vec3(1.00, 0.88,  0.62);   /* warm glow           */
    vec3 cWhite  = vec3(1.00, 0.96,  0.90);   /* hot white           */

    /* ── 1. Base: dark purple, brightening outward ─────── */
    vec3 col = mix(cVoid, cPurp, smoothstep(0.15, 1.55, rE));

    /* ── 2. Concentric oval rings (outer region) ───────── */
    float r1 = ovalRings(uv, 0.88, 1.30, 21.0, 0.20, t);
    float r2 = ovalRings(uv, 1.12, 0.82, 38.0, 0.13, t);
    float r3 = ovalRings(uv * 0.70, 0.95, 1.10, 14.0, 0.28, t);
    float ringMask = smoothstep(0.40, 1.05, rE);
    col = mix(col, mix(cMauve * 0.50, cPink, r1), r1 * r1 * ringMask * 0.90);
    col += cMauve * r2 * r2 * ringMask * 0.28;
    col += cPink  * r3 * r3 * smoothstep(0.70, 1.40, rE) * 0.18;

    /* ── 3. Circuit-loop band ───────────────────────────── */
    /* Band visible where p4.y is small (near horizontal axis) */
    float bandMask = smoothstep(0.56, 0.16, p4.y);
    col = mix(col, cBrown, bandMask * 0.55);

    float loops13 = circuitLoops(p4, 13.0, t);
    float loops17 = circuitLoops(p4, 17.0, t);
    col = mix(col, cCopper * 1.5, loops13 * bandMask * 0.92);
    /* Faint loops everywhere as subtle PCB texture */
    col += cCopper * 0.07 * loops17 * smoothstep(0.90, 0.20, rD);

    /* ── 4. Central diamond orange glow ─────────────────── */
    float d0 = 1.0 - smoothstep(0.0, 1.40, rD);  /* wide orange wash  */
    float d1 = 1.0 - smoothstep(0.0, 0.72, rD);  /* amber mid         */
    float d2 = 1.0 - smoothstep(0.0, 0.30, rD);  /* glow core         */
    float d3 = 1.0 - smoothstep(0.0, 0.09, rD);  /* white hot centre  */

    col = mix(col, cOrange, pow(d0, 1.4) * 0.90);
    col = mix(col, cAmber,  pow(d1, 1.8) * 0.93);
    col = mix(col, cGlow,   pow(d2, 2.4) * 0.96);
    col = mix(col, cWhite,  pow(d3, 2.8));

    /* ── 5. Diagonal & cardinal light streaks ───────────── */
    float ang = atan(uv.y, uv.x);
    /* 4 diagonal streaks (45° / 135° / 225° / 315°) */
    float sa = mod(ang + PI * 0.25, PI * 0.5) - PI * 0.25;
    float str  = exp(-sa*sa * 16.0) * exp(-rE * 1.05);
    /* 4 cardinal streaks slightly fainter */
    float sb = mod(ang, PI * 0.5) - PI * 0.25;
    str += exp(-sb*sb * 24.0) * exp(-rE * 1.55) * 0.55;
    str  = clamp(str, 0.0, 1.0);
    col  = mix(col, cPink * 1.35, str * 0.68);
    col  = mix(col, cWhite,       str * str * 0.52);

    /* ── 6. Signal dots (additive glow) ─────────────────── */
    float dots = signalDots(p4, t);
    /* Bright white dots */
    col += cWhite  * min(dots, 1.0)              * 0.95;
    /* Amber halo where dots stack */
    col += cAmber  * clamp(dots - 1.0, 0.0, 1.0) * 0.50;
    /* Extra copper shimmer in the band */
    col += cCopper * min(dots, 1.0) * bandMask   * 0.30;

    /* ── 7. Edge vignette ───────────────────────────────── */
    col *= 1.0 - smoothstep(1.20, 1.88, rE) * 0.58;

    /* ── 8. Progress-driven evolution ───────────────────── */
    float pulse = sin(uTime * (2.0 + uProgress * 20.0)) * 0.5 + 0.5;
    /* Overall brightening */
    col = mix(col, col * (1.0 + uProgress * 2.4), uProgress * 0.72);
    /* Electric blue-white tint builds in */
    vec3 cElectric = vec3(0.42, 0.76, 1.00);
    col = mix(col, col + cElectric * 0.65, uProgress * uProgress * 0.55);
    /* Flickering pulse intensifies */
    col += cWhite * pulse * uProgress * uProgress * 0.25;
    /* Final white-out blaze */
    col = mix(col, cWhite, smoothstep(0.78, 1.0, uProgress));

    gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
  }
`;

/* ─── build scene ───────────────────────────────────────── */
const mat = new THREE.ShaderMaterial({
  vertexShader: vert,
  fragmentShader: frag,
  uniforms: {
    uTime:       { value: 0 },
    uProgress:   { value: 0 },
    uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) }
  }
});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  mat.uniforms.uResolution.value.set(innerWidth, innerHeight);
});

/* ─── render loop ───────────────────────────────────────── */
let loopStart = null;
(function loop(ts) {
  requestAnimationFrame(loop);
  if (loopStart === null) loopStart = ts;
  mat.uniforms.uTime.value     = ts * 0.001;
  mat.uniforms.uProgress.value = Math.min((ts - loopStart) / 6000, 1.0);
  renderer.render(scene, camera);
})(0);
</script>

<!-- Decoding Language Overlay -->
<div id="word-layer"></div>

  <div id="portal-ring"></div>

</div>

<script>
// ============================================
// DECODING LANGUAGE OVERLAY
// ============================================

const WORD_POOL = [
  'still', 'together', 'you', 'are', 'here',
  'the', 'system', 'knows', 'never', 'correct',
  'always', 'watching', 'signal', 'lost', 'found',
  'return', 'wrong', 'reality', 'decode', 'pattern',
  'loop', 'noise', 'trace', 'memory', 'dissolve',
  'frequency', 'belong', 'between', 'static', 'hold',
  'almost', 'wait', 'processing', 'through', 'answer'
];

const SYMBOLS = [
  '◯','△','◎','∞','☽','✦','@','∅','◈','⌬',
  '⊕','⊗','⌀','⌘','⍟','◬','⦿','⟁','✧','꩜'
];

const PATTERNS = [
  ['you','are','here'],
  ['still','together'],
  ['the','system','knows'],
  ['never','correct'],
  ['always','watching'],
  ['decode','the','signal'],
  ['lost','found'],
  ['wrong','reality'],
];

const STATUS_MSGS = [
  'reading signal...', 'calibrating...', 'pattern found...',
  'recalibrating...', 'signal lost...', 'decoding...',
  'synchronizing...', 'noise detected...', 'trace active...',
  'memory fragment...','processing loop...','frequency shift...'
];

const WORD_COUNT  = 22;
const MELT_START  = 1500;    // 1.5 s → letters begin melting
const PORTAL_TIME = 6000;    // 6 s → portal opens

let wordEls        = [];
let dragEl         = null, dragOffX = 0, dragOffY = 0;
let meltStarted    = false;
let portalActive   = false;
let startTime      = performance.now();

// ── helpers ─────────────────────────────────────────────
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(n)     { return Math.floor(Math.random() * n); }

function safePos() {
  return {
    x: rand(60, window.innerWidth  - 160),
    y: rand(60, window.innerHeight - 90)
  };
}

function setPos(el, x, y, animate) {
  if (!animate) el.classList.add('dragging');   // suppress transition temporarily
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  if (!animate) requestAnimationFrame(() => el.classList.remove('dragging'));
}

// ── build word elements ──────────────────────────────────
function createWords() {
  const layer    = document.getElementById('word-layer');
  const shuffled = [...WORD_POOL].sort(() => Math.random() - 0.5).slice(0, WORD_COUNT);

  shuffled.forEach((word, i) => {
    const el       = document.createElement('div');
    el.className   = 'word-frag';
    el.textContent = word;
    el.dataset.original = word;

    const pos = safePos();
    el.style.left    = pos.x + 'px';
    el.style.top     = pos.y + 'px';
    el.style.fontSize = rand(13, 23).toFixed(0) + 'px';
    el.style.opacity  = rand(0.55, 0.92).toFixed(2);

    layer.appendChild(el);
    wordEls.push(el);
  });
}

// ── drag ────────────────────────────────────────────────
function startDrag(el, cx, cy) {
  if (dragEl || portalActive) return;
  dragEl = el;
  el.classList.add('dragging');
  const r = el.getBoundingClientRect();
  dragOffX = cx - r.left;
  dragOffY = cy - r.top;
}

function moveDrag(cx, cy) {
  if (!dragEl) return;
  dragEl.style.left = (cx - dragOffX) + 'px';
  dragEl.style.top  = (cy - dragOffY) + 'px';
}

function endDrag() {
  if (!dragEl) return;
  dragEl.classList.remove('dragging');
  dragEl = null;
  checkProximityPattern();
}

document.addEventListener('mousedown',  e => { const el = e.target.closest('.word-frag'); if (el) { startDrag(el, e.clientX, e.clientY); e.preventDefault(); } });
document.addEventListener('mousemove',  e => moveDrag(e.clientX, e.clientY));
document.addEventListener('mouseup',    ()  => endDrag());
document.addEventListener('touchstart', e => { const t = e.touches[0]; const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('.word-frag'); if (el) { startDrag(el, t.clientX, t.clientY); e.preventDefault(); } }, { passive: false });
document.addEventListener('touchmove',  e => { const t = e.touches[0]; moveDrag(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
document.addEventListener('touchend',   ()  => endDrag());

// ── pattern detection ────────────────────────────────────
function getWordCenters() {
  return wordEls.map(el => {
    const r = el.getBoundingClientRect();
    return { el, x: r.left + r.width * 0.5, y: r.top + r.height * 0.5,
             text: el.textContent.toLowerCase().replace(/[^a-z]/g, '') };
  });
}

function checkProximityPattern() {
  const centers = getWordCenters();
  for (const pattern of PATTERNS) {
    const matched = pattern.map(w =>
      centers.find(c => c.text === w || (w.length > 3 && c.text.startsWith(w.slice(0, 3))))
    ).filter(Boolean);
    if (matched.length < 2) continue;

    const sorted = matched.sort((a, b) => a.x - b.x);
    let close = true;
    for (let i = 1; i < sorted.length; i++) {
      if (sorted[i].x - sorted[i-1].x > 180 || Math.abs(sorted[i].y - sorted[i-1].y) > 90) {
        close = false; break;
      }
    }
    if (close) { triggerPatternRecognized(); return; }
  }
}

// ── pattern recognized event ─────────────────────────────
function triggerPatternRecognized() {
  if (portalActive) return;
  const flash = document.getElementById('pattern-flash');
  const msgs  = ['PATTERN RECOGNIZED', 'SEQUENCE DETECTED', 'MATCH FOUND', 'SIGNAL LOCKED'];
  flash.textContent = msgs[randInt(msgs.length)];
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 1100);
  setTimeout(scatterWords, 500);
}

// ── scatter / reshuffle ──────────────────────────────────
function scatterWords() {
  if (portalActive) return;
  wordEls.forEach(el => {
    if (el === dragEl) return;
    const pos = safePos();
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
  });
}

// ── gentle drift: nudge 2 random words every 2.8 s ───────
setInterval(() => {
  if (portalActive) return;
  for (let k = 0; k < 4; k++) {
    const el = wordEls[randInt(wordEls.length)];
    if (!el || el === dragEl) continue;
    const cx = parseFloat(el.style.left);
    const cy = parseFloat(el.style.top);
    const nx = Math.max(40, Math.min(window.innerWidth  - 140, cx + rand(-80, 80)));
    const ny = Math.max(40, Math.min(window.innerHeight - 70,  cy + rand(-60, 60)));
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
  }
}, 700);

// ── auto-reshuffle every 12–20 s ─────────────────────────
function scheduleReshuffle() {
  setTimeout(() => {
    if (!portalActive) { scatterWords(); scheduleReshuffle(); }
  }, rand(1000, 2200));
}

// ── auto pattern trigger every 10–22 s (system acts alone)─
function scheduleAutoPattern() {
  setTimeout(() => {
    if (!portalActive) { triggerPatternRecognized(); scheduleAutoPattern(); }
  }, rand(700, 1600));
}

// ── status line cycling ───────────────────────────────────
const statusEl = document.getElementById('status-line');
setInterval(() => {
  if (portalActive) return;
  statusEl.textContent = STATUS_MSGS[randInt(STATUS_MSGS.length)];
}, 850);

// ── letter melt ──────────────────────────────────────────
function startMelt() {
  if (meltStarted) return;
  meltStarted = true;
  statusEl.textContent = 'signal degrading...';
  statusEl.style.color = 'rgba(255, 80, 180, 0.55)';

  setInterval(() => {
    if (portalActive) return;
    const el = wordEls[randInt(wordEls.length)];
    if (!el || el === dragEl) return;
    const txt = el.textContent;
    if (!txt.length) return;
    const idx = randInt(txt.length);
    el.textContent = txt.slice(0, idx) + SYMBOLS[randInt(SYMBOLS.length)] + txt.slice(idx + 1);
    el.classList.add('melted');
    el.style.opacity = rand(0.55, 1.0).toFixed(2);
  }, 220);
}

// ── portal activation ────────────────────────────────────
function activatePortal() {
  if (portalActive) return;
  portalActive = true;

  statusEl.textContent = '';

  // Fade all words out
  wordEls.forEach(el => { el.style.transition = 'opacity 0.6s'; el.style.opacity = '0'; });

  const overlay = document.getElementById('portal-overlay');
  const ring    = document.getElementById('portal-ring');
  const text    = document.getElementById('portal-text');
  const nav     = document.getElementById('nav-overlay');

  overlay.style.opacity = '1';

  setTimeout(() => {
    ring.style.width  = '360px';
    ring.style.height = '360px';
  }, 120);

  setTimeout(() => {
    text.style.color = 'rgba(255, 200, 255, 0.90)';
  }, 650);

  setTimeout(() => {
    nav.style.opacity = '1';
    nav.style.pointerEvents = 'auto';
  }, 1500);

  setTimeout(() => {
    window.location.href = 'gears.html';
  }, 2800);
}

// ── main timing loop ─────────────────────────────────────
(function tick() {
  requestAnimationFrame(tick);
  const elapsed  = performance.now() - startTime;
  const progress = Math.min(elapsed / PORTAL_TIME, 1.0);

  // Words converge toward center in the final 35%
  if (progress > 0.65 && !portalActive) {
    const cx  = window.innerWidth  / 2 - 40;
    const cy  = window.innerHeight / 2;
    const spd = (progress - 0.65) * 0.08;
    wordEls.forEach(el => {
      if (el === dragEl) return;
      const x = parseFloat(el.style.left) || cx;
      const y = parseFloat(el.style.top)  || cy;
      el.style.left = (x + (cx - x) * spd) + 'px';
      el.style.top  = (y + (cy - y) * spd) + 'px';
    });
  }

  // Mid-point urgency flash
  if (elapsed > PORTAL_TIME * 0.48 && elapsed < PORTAL_TIME * 0.48 + 100) {
    statusEl.textContent = 'convergence initiated...';
    statusEl.style.color  = 'rgba(255, 110, 210, 0.90)';
  }

  if (elapsed > MELT_START  && !meltStarted)  startMelt();
  if (elapsed > PORTAL_TIME && !portalActive) activatePortal();
})();

// ── init ─────────────────────────────────────────────────
createWords();
scheduleReshuffle();
scheduleAutoPattern();
</script>
